async function startMatchmaking(mode,category){
  if(!sb||!s.user){console.error('Matchmaking init failed: sb or user missing');return;}
  console.log('🔍 Matchmaking started:',mode,category);
  s.screen='matching';
  s.matchCategory=category;
  s.category=category;
  s.mode=mode;
  render();

  const {error}=await sb.from('matchmaking_queue').insert({
    player_id:s.user.id,
    mode:mode,
    category:category
  });

  if(error){
    console.error('❌ Queue insert error:',error);
    s.opp=generateBot(s.profile);
    beginMatch(false);
    return;
  }
  console.log('✅ Added to queue');

  let matchFound=false;
  const startTime=Date.now();

  const pollMatch=async()=>{
    if(matchFound) return;
    const elapsed=Date.now()-startTime;

    if(elapsed>8000){
      console.log('⏱ 8s timeout - spawning bot');
      matchFound=true;
      try{
        await sb.from('matchmaking_queue').delete().eq('player_id',s.user.id);
      }catch(e){
        console.error('Queue delete error:',e);
      }
      s.opp=generateBot(s.profile);
      s.directChallenge=false;
      beginMatch(false);
      return;
    }

    let queue=null;
    try{
      const res=await sb.from('matchmaking_queue')
        .select('player_id')
        .eq('mode',mode)
        .eq('category',category)
        .order('created_at');
      queue=res.data;
      if(res.error) console.error('Queue fetch error:',res.error);
    }catch(e){
      console.error('Queue fetch exception:',e);
    }

    console.log('Queue size:',queue?.length||0);

    if(!queue||queue.length<2){
      setTimeout(pollMatch,300);
      return;
    }

    for(const q of queue){
      if(q.player_id===s.user.id) continue;

      let opp=null;
      try{
        const res=await sb.from('profiles').select('*').eq('id',q.player_id).single();
        opp=res.data;
        if(res.error){console.log('Profile fetch error for',q.player_id,':',res.error);continue;}
      }catch(e){
        console.log('Profile fetch exception for',q.player_id,':',e);
        continue;
      }
      if(!opp){console.log('No profile for',q.player_id);continue;}

      const pSeason=seasonBadge(s.profile);
      const oppSeason=seasonBadge(opp);

      console.log('Checking match:',pSeason.label,'vs',oppSeason.label);

      if(oppSeason.label===pSeason.label){
        console.log('✨ MATCH FOUND:',opp.display_name);
        matchFound=true;
        try{
          await sb.from('matchmaking_queue').delete().eq('player_id',s.user.id);
          await sb.from('matchmaking_queue').delete().eq('player_id',q.player_id);
        }catch(e){
          console.error('Queue delete error:',e);
        }
        s.opp={...opp};
        s.directChallenge=false;
        beginMatch(false);
        return;
      }
    }

    setTimeout(pollMatch,300);
  };

  pollMatch();
}

    QUESTIONS = shuffle(QUESTION_BANK.filter(q=>!q.difficulty || q.difficulty===(isYouChamp?'hard':'easy'))).slice(0,5);
  } else {
    QUESTIONS = shuffle(QUESTION_BANK).slice(0,5);
  }
  clearTimers(); s.correctCount=0; s.directChallenge=direct;
  Object.assign(s,{youScore:0,oppScore:0,qIndex:0,pu:{fifty:1,freeze:1,double:1},puUsed:{},doubleActive:false,oppFrozen:false,hidden:[],screen:'matching',timeAttackRemain:60});
  render();
  matchTimer=setTimeout(toCountdown, direct?1700:2300);
}
function onRematch(){s.lastWinner=s.youWon?'you':'opp';beginMatch(s.directChallenge);}
function toCountdown(){
  clearTimers(); s.screen='countdown'; s.cd=3; render();
  cdTimer=setInterval(()=>{ s.cd--; if(s.cd<=0){clearInterval(cdTimer);startQuestion(0);}else render(); },850);
}
function startQuestion(i){
  clearTimers();
  const q=QUESTIONS[i];
  s.oppWill=Math.random()<0.85;
  const oppTimeBudget=s.mode==='timeattack'?2.5:QT;
  s.oppTime=s.oppWill ? +(1.4+Math.random()*(oppTimeBudget-1.5)).toFixed(1) : null;
  s.oppRight=Math.random()<0.6;
  s.oppChoice=s.oppRight ? q.correct : (()=>{let w;do{w=Math.floor(Math.random()*4);}while(w===q.correct);return w;})();
  const questionTimer=s.mode==='timeattack'?s.timeAttackRemain:QT;
  Object.assign(s,{screen:'duel',phase:'answering',qIndex:i,timeLeft:questionTimer,youAnswer:null,oppAnswered:false,youGain:0,oppGain:0,puUsed:{},doubleActive:false,oppFrozen:false,hidden:[]});
  render();
  qTimer=setInterval(tick,100);
}
function tick(){
  s.timeLeft=+(s.timeLeft-0.1).toFixed(2);
  if(s.mode==='timeattack') s.timeAttackRemain=Math.max(0, s.timeAttackRemain-0.1);
  const elapsed=(s.mode==='timeattack'?QT:QT)-s.timeLeft;
  if(!s.oppAnswered && !s.oppFrozen && s.oppTime!=null && elapsed>=s.oppTime){s.oppAnswered=true; updateDuelHeader();}
  if(s.timeLeft<=0 || (s.mode==='timeattack' && s.timeAttackRemain<=0)){clearInterval(qTimer);s.timeLeft=0;reveal(true);return;}
  updateTimer();
}
function updateTimer(){
  const n=document.getElementById('tnum'); const r=document.getElementById('tring');
  const displayTime=s.mode==='timeattack'?s.timeAttackRemain:s.timeLeft;
  const maxTime=s.mode==='timeattack'?60:QT;
  if(n) n.textContent=Math.ceil(displayTime);
  if(r){
    const pct=displayTime/maxTime, circ=2*Math.PI*34;
    r.style.strokeDashoffset=circ*(1-pct);
    r.style.stroke=pct>.5?s.accent:pct>.25?'#FFC93C':'#FF6B6B';
  }
}
function updateDuelHeader(){
  const el=document.getElementById('oppCheck');
  if(el) el.style.display='flex';
}
function choose(i){
  if(s.phase!=='answering')return;
  clearInterval(qTimer); s.youAnswer=i; render();
  chooseTimer=setTimeout(()=>reveal(false),650);
}
function reveal(timedOut){
  clearInterval(qTimer); if(s.phase==='revealed')return;
  const q=QUESTIONS[s.qIndex];
  const youTime=timedOut?QT:(QT-s.timeLeft);
  const youRight=s.youAnswer===q.correct;
  if(youRight) s.correctCount++;
  const oppInTime=s.oppWill&&s.oppTime!=null&&s.oppTime<QT;
  const oppRight=oppInTime&&s.oppRight;

  if(s.mode==='survival'){
    if(!youRight) s.youLives--;
    if(!oppRight) s.oppLives--;
    if(s.youLives<=0||s.oppLives<=0) return setTimeout(toSummary,1200);
  } else if(s.mode==='timeattack'){
    if(youRight) s.youScore++;
    if(oppRight) s.oppScore++;
  } else {
    const dbl=s.doubleActive?2:1;
    const youGain=youRight?pts(youTime)*dbl:0;
    const oppGain=oppRight?pts(s.oppTime):0;
    s.youFaster=youRight&&oppRight&&youTime<s.oppTime;
    Object.assign(s,{youScore:s.youScore+youGain,oppScore:s.oppScore+oppGain,youGain,oppGain});
  }
  Object.assign(s,{phase:'revealed',oppAnswered:oppInTime});
  render();
  revealTimer=setTimeout(nextQ, s.mode==='survival'?2200:3400);
}
function nextQ(){
  clearTimeout(revealTimer);
  if(s.mode==='timeattack' && s.timeAttackRemain<=0) return toSummary();
  const ni=s.qIndex+1;
  if(ni>=QUESTIONS.length) toSummary();
  else startQuestion(ni);
}
function toSummary(){clearTimers();s.youWon=s.youScore>s.oppScore;s.screen='summary';render();saveMatch();}
function quitMatch(){s.quitConfirm=true;render();}
function confirmQuit(){goHome();}
function cancelQuit(){s.quitConfirm=false;render();}
function useFifty(){
  if(s.phase!=='answering'||s.pu.fifty<=0||s.puUsed.fifty)return;
  const q=QUESTIONS[s.qIndex]; const wrong=[];
  for(let i=0;i<4;i++)if(i!==q.correct)wrong.push(i);
  while(wrong.length>2)wrong.splice(Math.floor(Math.random()*wrong.length),1);
  s.hidden=wrong; s.pu.fifty--; s.puUsed.fifty=true; render();
}
function useFreeze(){
  if(s.phase!=='answering'||s.pu.freeze<=0||s.puUsed.freeze)return;
  s.oppFrozen=true; s.oppAnswered=false; s.oppWill=false;
  s.pu.freeze--; s.puUsed.freeze=true; render();
}
function useDouble(){
  if(s.phase!=='answering'||s.pu.double<=0||s.puUsed.double)return;
  s.doubleActive=true; s.pu.double--; s.puUsed.double=true; render();
}

function renderDuel(){
  const q=QUESTIONS[s.qIndex]; const opp=s.opp;
  const answering=s.phase==='answering'; const revealed=s.phase==='revealed';
  const displayTime=s.mode==='timeattack'?s.timeAttackRemain:s.timeLeft;
  const maxTime=s.mode==='timeattack'?60:QT;
  const pct=displayTime/maxTime; const circ=2*Math.PI*34;
  const tColor=pct>.5?s.accent:pct>.25?'#FFC93C':'#FF6B6B';
  const letters=['A','B','C','D'];

  const isTrueFalse=q.type==='true_false';
  const opts=isTrueFalse
    ?[
      {text:'True',val:0},{text:'False',val:1}
    ].map((opt,i)=>{
      let box=`display:flex;align-items:center;justify-content:center;gap:12px;padding:20px 24px;border-radius:18px;cursor:${answering?'pointer':'default'};border:2px solid;font-family:'Fredoka',sans-serif;font-weight:700;font-size:20px;`;
      let col='#fff';
      if(revealed){
        const ok=opt.val===q.correct; const youPick=opt.val===s.youAnswer; const oppPick=s.oppAnswered&&opt.val===s.oppChoice;
        if(ok){box+=`background:rgba(63,217,138,.15);border-color:#3FD98A;`;col='#3FD98A';}
        else if(youPick){box+=`background:rgba(255,107,107,.12);border-color:#FF6B6B;`;col='#FF6B6B';}
        else{box+=`background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);opacity:.45;`;col='#B9A9E0';}
      } else {
        const sel=opt.val===s.youAnswer;
        box+=sel?`background:rgba(255,255,255,.12);border-color:var(--accent);`:`background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);`;
        col=sel?'var(--accent)':'#B9A9E0';
      }
      return `<div onclick="${answering?`choose(${opt.val})`:''}" style="${box};color:${col};">${opt.text}</div>`;
    }).join('')
    :q.options.map((text,i)=>{
      if(s.hidden.includes(i))return '';
      let box=`display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:16px;cursor:${answering?'pointer':'default'};border:1.5px solid;`;
      let badge=`width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;`;
      let sfx='';
      if(revealed){
        const ok=i===q.correct; const youPick=i===s.youAnswer; const oppPick=s.oppAnswered&&i===s.oppChoice&&!s.oppFrozen;
        if(ok){box+=`background:rgba(63,217,138,.15);border-color:#3FD98A;`;badge+=`background:#3FD98A;color:#0B2E1B;`;}
        else if(youPick){box+=`background:rgba(255,107,107,.12);border-color:#FF6B6B;`;badge+=`background:#FF6B6B;color:#fff;`;}
        else{box+=`background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);opacity:.45;`;badge+=`background:rgba(255,255,255,.08);color:#B9A9E0;`;}
        if(ok) sfx+=ic('check_circle',24,'#3FD98A');
        if(youPick&&!ok) sfx+=ic('cancel',24,'#FF6B6B');
        if(oppPick) sfx+=av(28,opp.c1,opp.c2,opp.initial,opp.tc);
      } else {
        const sel=i===s.youAnswer;
        box+=sel?`background:rgba(255,255,255,.12);border-color:var(--accent);`:`background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);`;
        badge+=sel?`background:var(--accent);color:#fff;`:`background:rgba(255,255,255,.1);color:#B9A9E0;`;
      }
      return `<div onclick="${answering?`choose(${i})`:''}" style="${box}"><div style="${badge}">${letters[i]}</div><span style="flex:1;font-size:15px;">${text}</span>${sfx}</div>`;
    }).join('');

  const dots=QUESTIONS.map((_,i)=>{
    let st=`height:8px;border-radius:4px;transition:all .3s;width:${i===s.qIndex?22:8}px;`;
    st+=i<s.qIndex?`background:#3FD98A;`:i===s.qIndex?`background:var(--accent);`:`background:rgba(255,255,255,.18);`;
    return `<div style="${st}"></div>`;
  }).join('');

  const pus=[
    {key:'fifty', icon:'filter_2',  label:'50/50',  col:'#8B6CF0', fn:'useFifty()'},
    {key:'freeze',icon:'ac_unit',   label:'Freeze', col:'#8FD9FF', fn:'useFreeze()'},
    {key:'double',icon:'bolt',      label:'2×',     col:'#FFC93C', fn:'useDouble()'},
  ];
  const puHtml=pus.map(p=>{
    const cnt=s.pu[p.key]; const used=s.puUsed[p.key]; const dis=cnt<=0||used;
    return `<div onclick="${!dis&&answering?p.fn:''}" style="flex:1;position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 6px;border-radius:14px;border:1px solid ${dis?'rgba(255,255,255,.08)':`${p.col}55`};background:${dis?'rgba(255,255,255,.04)':`${p.col}18`};cursor:${!dis&&answering?'pointer':'default'};opacity:${dis?.4:1};">
      ${ic(p.icon,20,dis?'#8676A8':p.col)}

      ${!used&&cnt>0?`<div style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:${p.col};font-size:9px;font-family:'Fredoka',sans-serif;font-weight:700;color:#1C0F40;display:flex;align-items:center;justify-content:center;">${cnt}</div>`:''}
    </div>`;
  }).join('');

  const youRight=s.youAnswer===q.correct;

  const oppScoreText=s.mode==='timeattack'?`${s.oppScore} correct`:s.mode==='survival'?`${s.oppLives} live${s.oppLives!==1?'s':''}`:` ${s.oppScore} pts`;

  return `<div style="display:flex;flex-direction:column;height:100%;padding:8px 20px 14px;color:#fff;">

    <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
      <div style="flex:1;display:flex;align-items:center;gap:9px;">

          <span style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;">You</span>

          <circle id="tring" cx="36" cy="36" r="34" fill="none" stroke="${tColor}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"/>
        </svg>
        <div style="position:absolute;inset:4px;border-radius:50%;background:#1C0F40;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span id="tnum" style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:27px;line-height:1;">${Math.ceil(s.mode==='timeattack'?s.timeAttackRemain:s.timeLeft)}</span>
          <span style="font-size:8.5px;color:#B9A9E0;letter-spacing:.14em;">SEC</span>
        </div>
      </div>
      <div style="flex:1;display:flex;align-items:center;gap:9px;flex-direction:row-reverse;">
        <div style="position:relative;">
          ${av(42,opp.c1,opp.c2,opp.initial,opp.tc)}
          ${s.oppFrozen?`<div style="position:absolute;right:-3px;bottom:-3px;width:20px;height:20px;border-radius:50%;background:#8FD9FF;border:2px solid #1C0F40;display:flex;align-items:center;justify-content:center;">${ic('ac_unit',13,'#08263A')}</div>`:''}
          <div id="oppCheck" style="position:absolute;right:-3px;bottom:-3px;width:20px;height:20px;border-radius:50%;background:#34E0C8;border:2px solid #1C0F40;display:${s.oppAnswered&&!s.oppFrozen?'flex':'none'};align-items:center;justify-content:center;">${ic('check',13,'#0C3B36')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;">
          <span style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;">${opp.name}</span>
          <span style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:13px;color:#34E0C8;">${oppScoreText}</span>
        </div>
      </div>
    </div>

    <!-- Progress + category -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;">
      <div style="display:flex;align-items:center;gap:5px;">${dots}</div>
      <div style="display:flex;align-items:center;gap:5px;background:${q.col}22;border:1px solid ${q.col}55;padding:5px 10px;border-radius:999px;">
        ${ic(q.icon,14,q.col)}<span style="font-size:11px;font-family:'Fredoka',sans-serif;font-weight:600;color:${q.col};">${q.cat}</span>
      </div>
    </div>

    <!-- Question -->
    <div style="margin-top:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--accent);font-family:'Fredoka',sans-serif;">QUESTION ${s.qIndex+1} OF ${QUESTIONS.length}</span>
        ${s.doubleActive?`<div style="display:flex;align-items:center;gap:4px;background:rgba(255,93,122,.2);border:1px solid var(--accent);padding:3px 9px;border-radius:999px;">${ic('bolt',13,s.accent)}<span style="font-size:10px;font-family:'Fredoka',sans-serif;font-weight:700;color:var(--accent);">2× POINTS</span></div>`:''}
      </div>
      <div style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:21px;line-height:1.18;margin-top:9px;">${q.q}</div>
    </div>

    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:9px;margin-top:13px;">${opts}</div>

    <!-- Power-ups -->
    ${answering&&!isTrueFalse?`<div style="display:flex;gap:9px;margin-top:13px;">${puHtml}</div>`:''}

    <!-- Bottom -->
    <div style="margin-top:auto;padding-top:12px;">
      ${revealed
        ? `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;animation:riseIn .3s ease-out;">
            <div style="display:flex;flex-direction:column;">
              <span style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;color:${resCol};">${resTitle}</span>
              ${s.mode!=='timeattack'?`<span style="font-size:12px;color:#B9A9E0;">You <b style="color:var(--accent);">+${s.youGain}</b> · ${opp.name} <b style="color:#34E0C8;">+${s.oppGain}</b></span>`:''}
            </div>
            <div onclick="nextQ()" style="display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;padding:12px 22px;border-radius:999px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 8px 18px rgba(255,93,122,.4);">Next${ic('arrow_forward',19,'#fff')}</div>
          </div>`
        : `<div onclick="quitMatch()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid rgba(255,255,255,.2);color:#B9A9E0;padding:13px;border-radius:16px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:15px;cursor:pointer;margin-top:4px;">${ic('close',19,'#B9A9E0')}Quit Match</div>`}
    </div>
  </div>
  ${s.quitConfirm?`<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;">
    <div style="background:#1C0F40;border-radius:24px;padding:28px;max-width:280px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.8);animation:popIn .3s ease-out;">
      <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,93,122,.14);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">${ic('info',36,'#FF5D7A')}</div>
      <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px;">Quit Match?</div>
      <div style="font-size:13px;color:#B9A9E0;margin-bottom:20px;">Your progress will not be saved.</div>
      <div style="display:flex;gap:10px;">
        <div onclick="cancelQuit()" style="flex:1;padding:12px;border-radius:14px;background:rgba(255,255,255,.08);color:#B9A9E0;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;cursor:pointer;">Cancel</div>
        <div onclick="confirmQuit()" style="flex:1;padding:12px;border-radius:14px;background:#FF5D7A;color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;cursor:pointer;">Quit</div>
      </div>
    </div>
  </div>`:''}
  </div>`;
}

function renderSummary(){
  const opp=s.opp;
  let won=s.youWon; let tied=s.youScore===s.oppScore;
  if(s.mode==='survival'){ won=s.youLives>s.oppLives; tied=s.youLives===s.oppLives; }
  else if(s.mode==='timeattack'){ won=s.youScore>s.oppScore; tied=s.youScore===s.oppScore; }
  s.youWon=won;
  const acc=Math.round((s.correctCount/QUESTIONS.length)*100);
  const coins=won?120:tied?60:40;
  const icon=won?'emoji_events':tied?'handshake':'sentiment_dissatisfied';
  const bg=won?'linear-gradient(135deg,#FFD24A,#FF914D)':tied?'linear-gradient(135deg,#8B6CF0,#34E0C8)':'linear-gradient(135deg,#6A4ED0,#3A1E72)';
  const glow=won?'rgba(255,210,74,.4)':tied?'rgba(139,108,240,.4)':'rgba(106,78,208,.3)';
  const title=won?'Victory!':tied?"It's a Tie!":'Defeated';
  const tCol=won?'#FFD24A':tied?'#34E0C8':'#C9BCEC';
  const modeLabel=s.mode==='survival'?'Last player standing':(s.mode==='timeattack'?'Most correct answers':(s.mode==='handicap'?'Final score':''));
  const sub=modeLabel?modeLabel:(won?`You outscored ${opp.name}!`:tied?'Evenly matched!':`${opp.name} won this round`);

  return `<div style="display:flex;flex-direction:column;align-items:center;padding:20px 24px 22px;color:#fff;text-align:center;">
    <div style="margin-top:14px;animation:popIn .5s ease-out;">
      <div style="width:96px;height:96px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;box-shadow:0 14px 36px ${glow};">${ic(icon,52,'#fff')}</div>
    </div>
    <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;margin-top:16px;color:${tCol};">${title}</div>
    <div style="font-size:13.5px;color:#B9A9E0;margin-top:2px;">${sub}</div>

    <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-top:24px;width:100%;">
      <div style="flex:1;background:${won?'rgba(255,93,122,.14)':'rgba(255,255,255,.04)'};border:1.5px solid ${won?'var(--accent)':'rgba(255,255,255,.1)'};border-radius:22px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;">
        ${av(50,'#FF8FA8','#FF5D7A','M','#fff',2,'rgba(255,255,255,.85)')}
        <div style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;margin-top:8px;">You</div>
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:28px;color:var(--accent);margin-top:2px;">${s.youScore}</div>
      </div>
      <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;color:#FFC93C;">VS</div>
      <div style="flex:1;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:22px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;">
        ${av(50,opp.c1,opp.c2,opp.initial,opp.tc)}
        <div style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;margin-top:8px;">${opp.name}</div>
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:28px;color:#34E0C8;margin-top:2px;">${s.oppScore}</div>
      </div>
    </div>

    <div style="display:flex;gap:11px;margin-top:18px;width:100%;">
      <div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:13px 8px;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:20px;">${s.correctCount}/${QUESTIONS.length}</div>
        <div style="font-size:10.5px;color:#B9A9E0;margin-top:2px;">Correct</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:13px 8px;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:20px;color:#34E0C8;">${acc}%</div>
        <div style="font-size:10.5px;color:#B9A9E0;margin-top:2px;">Accuracy</div>
      </div>
      <div style="flex:1;background:rgba(255,201,60,.12);border:1px solid rgba(255,201,60,.25);border-radius:16px;padding:13px 8px;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:20px;color:#FFC93C;">+${coins}</div>
        <div style="font-size:10.5px;color:#B9A9E0;margin-top:2px;">Coins</div>
      </div>
    </div>

    <div style="flex:1;min-height:20px;"></div>
    <div onclick="onRematch()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;padding:16px;border-radius:18px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;cursor:pointer;box-shadow:0 12px 26px rgba(255,93,122,.4);margin-top:20px;">
      ${ic('replay',21,'#fff')}Rematch
    </div>
    <div onclick="goHome()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid rgba(255,255,255,.22);color:#fff;padding:15px;border-radius:18px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:16px;cursor:pointer;margin-top:11px;">Back to Home</div>
  </div>`;
}

const LB_COLS=['#8B6CF0','#FF914D','#34E0C8','#FFC93C','#FF5D7A','#6AB7FF','#3FD98A','#FF8FD4','#FFB27A','#B79CFF'];
const LB_COLS2=['#6A4ED0','#E76A2B','#1FB8A6','#E0A91F','#C13468','#4A8FD0','#1FB86A','#E06AB0','#E07A3A','#9070E0'];
function renderLeaderboard(){
  if(s.lbLoading) return `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:16px;">
    ${ic('hourglass_top',40,'#B9A9E0')}
    <span style="font-family:'Fredoka',sans-serif;font-size:16px;color:#B9A9E0;">Loading…</span>
  </div>`;
  const data=s.lbData; const uid=s.user?.id;
  const podium=data.slice(0,3); const rest=data.slice(3);
  const podiumOrder=[1,0,2]; // indices: 2nd, 1st, 3rd from left to right
  const heights=[66,94,52]; const fontSizes=[24,30,22]; // heights/fonts in display order (left, middle, right)
  const displayCols=['#CBD3E8','#FFD24A','#E59B6B']; // silver, gold, bronze in display order
  const avSizes=[54,64,54];
  const podiumHTML=podiumOrder.map((origIdx,displayIdx)=>{
    if(!podium[origIdx]) return '';
    const u=podium[origIdx]; const isMe=u.id===uid;
    const w=displayIdx===1?100:96; // middle is wider
    const rank=origIdx+1; // 1st, 2nd, or 3rd
    const col=displayCols[displayIdx]; // use display order for colors
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:${w}px;">
      ${displayIdx===1?ic('emoji_events',30,'#FFD24A','margin-bottom:-2px;'):''}
      ${av(avSizes[displayIdx],LB_COLS[displayIdx],LB_COLS2[displayIdx],(u.display_name[0]).toUpperCase(),displayIdx===2?'#0C3B36':'#fff',3,col)}
      <div style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:${displayIdx===1?14:13}px;">${isMe?'You':u.display_name}</div>
      <div style="font-size:12px;color:${col};font-family:'Fredoka',sans-serif;font-weight:600;">${u.wins} W</div>
      <div style="width:100%;height:${heights[displayIdx]}px;border-radius:14px 14px 0 0;background:linear-gradient(180deg,${col}44,${col}08);display:flex;align-items:flex-start;justify-content:center;padding-top:${displayIdx===1?12:10}px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:${fontSizes[displayIdx]}px;color:${col};">${rank}</div>
    </div>`;
  }).filter(x=>x).join('');
  const restHTML=rest.map((u,ri)=>{
    const rank=ri+4; const isMe=u.id===uid; const ci=rank-1;
    return `<div style="display:flex;align-items:center;gap:13px;padding:${isMe?11:9}px 14px;border-radius:16px;background:${isMe?'rgba(255,93,122,.16)':'rgba(255,255,255,.04)'};${isMe?'border:1.5px solid var(--accent);':''}">
      <span style="width:20px;font-family:'Fredoka',sans-serif;font-weight:${isMe?700:600};font-size:15px;color:${isMe?'var(--accent)':'#B9A9E0'};text-align:center;">${rank}</span>
      ${av(isMe?38:36,LB_COLS[ci%10],LB_COLS2[ci%10],(u.display_name[0]).toUpperCase(),'#fff',isMe?2:0,isMe?'rgba(255,255,255,.85)':'transparent')}
      <div style="flex:1;"><div style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:14.5px;">${isMe?`You · ${u.display_name}`:u.display_name}</div><div style="font-size:11px;color:${isMe?'#FFC2CE':'#B9A9E0'};">Level ${lvl(u)} · ${u.wins} wins</div></div>
      <span style="font-family:'Fredoka',sans-serif;font-weight:${isMe?700:600};font-size:14.5px;">${(u.wins*100+(u.xp||0)).toLocaleString()}</span>
    </div>`;
  }).join('');
  return `<div style="display:flex;flex-direction:column;padding:8px 20px 16px;color:#fff;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
      <span style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:24px;">Leaderboard</span>
      <div onclick="fetchLeaderboard()" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);padding:6px 12px;border-radius:999px;cursor:pointer;">${ic('refresh',17,'#B9A9E0')}<span style="font-size:12px;color:#B9A9E0;font-family:'Fredoka',sans-serif;font-weight:500;">Refresh</span></div>
    </div>
    ${data.length===0?`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;margin-top:60px;color:#B9A9E0;font-family:'Fredoka',sans-serif;font-size:15px;">${ic('leaderboard',40,'#8676A8')}<span>No players yet — play a match!</span></div>`:`
    <div style="display:flex;align-items:flex-end;justify-content:center;gap:9px;margin-top:24px;">${podiumHTML}</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">${restHTML}</div>`}
  </div>`;
}

      </div>
      <div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:13px 8px;text-align:center;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#FF914D;display:flex;align-items:center;justify-content:center;gap:3px;">${p.streak}${ic('local_fire_department',18,'#FF914D')}</div>

      <div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:13px 8px;text-align:center;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#34E0C8;">${acc(p)}%</div><div style="font-size:11px;color:#B9A9E0;margin-top:2px;">Accuracy</div>

    <div style="display:flex;gap:11px;margin-top:12px;">
      <div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:11px 8px;text-align:center;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;color:#FFC93C;">${p.coins}</div><div style="font-size:10px;color:#B9A9E0;margin-top:1px;">Coins</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:11px 8px;text-align:center;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;color:#FF6B6B;">${p.losses}</div><div style="font-size:10px;color:#B9A9E0;margin-top:1px;">Losses</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:11px 8px;text-align:center;">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;">${p.total_questions}</div><div style="font-size:10px;color:#B9A9E0;margin-top:1px;">Played</div>
      </div>
    </div>
    ${s.user?`<div style="margin-top:20px;flex:1;">
      <div style="font-size:12px;color:#8676A8;margin-bottom:4px;">Signed in as</div>
      <div style="font-size:13px;color:#B9A9E0;">${s.user.email||''}</div>
    </div>
    <div onclick="doSignOut()" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid rgba(255,107,107,.35);color:#FF8F8F;padding:13px;border-radius:16px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:15px;cursor:pointer;margin-top:20px;">
      ${ic('logout',19,'#FF8F8F')}Sign Out
    </div>`:`<div style="margin-top:20px;flex:1;">
      <div style="font-size:12px;color:#8676A8;">Playing as guest — progress won't be saved.</div>
    </div>
    <div onclick="s.screen='auth';render()" style="display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;padding:14px;border-radius:18px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;cursor:pointer;margin-top:20px;box-shadow:0 10px 24px rgba(255,93,122,.35);">
      ${ic('login',19,'#fff')}Sign In / Create Account
    </div>`}
  </div>`;
}

sbInit();

// Inline Service Worker
const sw = `
const CACHE_NAME = 'trivia-duel-v1';
self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['/'])).catch(() => {})); self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(names => Promise.all(names.map(n => n !== CACHE_NAME ? caches.delete(n) : null)))); self.clients.claim(); });
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => { if (res && res.status === 200) { const cache = caches.open(CACHE_NAME); cache.then(c => c.put(e.request, res.clone())); } return res; }).catch(() => caches.match('/index.html'))));
});
`;
const blob = new Blob([sw], {type: 'application/javascript'});
const swUrl = URL.createObjectURL(blob);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(swUrl).then(() => console.log('SW registered')).catch(e => console.log('SW failed:', e));
}
</script>
